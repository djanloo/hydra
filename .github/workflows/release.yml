name: build-packages

# Build the desktop GUI for Linux (AppImage) and Windows (.exe + installer).
# Runs on every version tag (v*) and on manual dispatch. On a tag, the artifacts
# are attached to a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------- Linux ----
  linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential libusb-1.0-0-dev \
            libgl1 libegl1 libxkbcommon0 libxcb-cursor0 \
            libfontconfig1 libdbus-1-3

      - name: Build & install hydrafers (+ PyInstaller)
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build AppImage
        run: PYTHON="$(which python)" bash packaging/build_appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: HydraFERS-linux-AppImage
          path: dist/*.AppImage
          if-no-files-found: error

  # -------------------------------------------------------------- Windows ----
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build & install hydrafers (+ PyInstaller)
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Run PyInstaller
        run: python -m PyInstaller --noconfirm --distpath dist --workpath build/pyi packaging/hydrafers.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc packaging\hydrafers.iss

      - name: Zip portable onedir
        shell: pwsh
        run: Compress-Archive -Path dist/hydrafers/* -DestinationPath dist/HydraFERS-windows-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: HydraFERS-windows
          path: |
            dist/HydraFERS-Setup-*.exe
            dist/HydraFERS-windows-portable.zip
          if-no-files-found: error

  # -------------------------------------------------------------- Release ----
  release:
    needs: [linux-appimage, windows-exe]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
